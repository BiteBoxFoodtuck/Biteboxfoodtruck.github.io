<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bite Box</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
}

/* NAVBAR */
nav {
  position: fixed;
  width: 100%;
  top: 0;
  background: rgba(0,0,0,0.9);
  padding: 15px;
  text-align: center;
  z-index: 1000;
}

nav a {
  color: #ffd400;
  margin: 0 20px;
  text-decoration: none;
  font-weight: bold;
}

/* HERO */
.hero {
  height: 100vh;
  background: url("menu.png") center/cover no-repeat;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.hero img {
  width: 220px;
  margin-bottom: 20px;
}

.hero h1 {
  font-size: 60px;
  color: #ffd400;
  margin: 0;
}

/* BUTTON */
.btn {
  margin-top: 20px;
  padding: 15px 30px;
  background: #ffd400;
  color: black;
  text-decoration: none;
  font-weight: bold;
  border-radius: 5px;
}

/* SECTION */
.section {
  padding: 80px 20px;
  max-width: 900px;
  margin: auto;
}

h2 {
  color: #ffd400;
}

/* MENU */
.menu-item {
  margin-bottom: 20px;
  font-size: 18px;
}

.price {
  color: #ffd400;
  font-weight: bold;
}

/* FOOTER */
footer {
  background: black;
  padding: 30px;
  text-align: center;
}
</style>

</head>

<body>

<!-- NAV -->
<nav>
  <a href="#menu">Meny</a>
  <a href="#info">Info</a>
</nav>

<!-- HERO -->
<div class="hero">
  <img src="logo.png" alt="Bite Box">
  <h1>BITE BOX</h1>
  <a href="tel:0700000000" class="btn">📞 Ring & Beställ</a>
</div>

<!-- MENU -->
<div class="section" id="menu">
  <h2>Burgare</h2>

  <div class="menu-item">
    Cheeseburger<br>
    <span class="price">75 / 119 kr</span>
  </div>

  <div class="menu-item">
    Bacon Burger<br>
    <span class="price">80 / 129 kr</span>
  </div>

  <div class="menu-item">
    Chicken Burger<br>
    <span class="price">80 / 129 kr</span>
  </div>

  <h2>Sides</h2>

  <div class="menu-item">
    Wings – 65 / 129 kr
  </div>

  <div class="menu-item">
    Dirty Fries – 65 kr
  </div>
</div>

<!-- INFO -->
<div class="section" id="info">
  <h2>Öppettider</h2>
  <p>Mån–Lör 11–14 & 16–21</p>

  <h2>Adress</h2>
  <p>
    Blåklintsvägen 36<br>
    Slättåkra Bastuväg 2
  </p>
</div>

<footer>
  © Bite Box Foodtruck
</footer>

</body>
</html>
